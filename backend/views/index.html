<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-br from-slate-50 to-slate-100 font-sans antialiased"
  >
    <nav
      class="bg-white/80 backdrop-blur-sm shadow-sm sticky top-0 z-50 border-b border-slate-200"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-md"
            >
              <svg
                class="w-6 h-6 text-white"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                />
              </svg>
            </div>
            <span class="text-xl font-bold text-slate-800"
              >Timetable Scheduler</span
            >
          </div>
          <div id="nav-links" class="flex items-center gap-4"></div>
        </div>
      </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-center">
      <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 max-w-2xl mx-auto">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">
          Smart Timetable Generation
        </h1>
        <p class="text-xl text-slate-600 mb-8">
          Create conflict‑free timetables automatically with our intelligent
          scheduling engine.
        </p>
        <div id="cta" class="space-x-4">
          <a
            href="/login"
            class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition"
            >Get Started</a
          >
        </div>
      </div>
    </main>
    <script src="/js/api.js"></script>
    <script>
      const token = localStorage.getItem("token");
      const nav = document.getElementById("nav-links");
      if (token) {
        fetch("/api/auth/me", { headers: { Authorization: `Bearer ${token}` } })
          .then((res) => (res.ok ? res.json() : Promise.reject()))
          .then((data) => {
            nav.innerHTML = `
                        <span class="text-slate-600">Hello, ${data.user.username}</span>
                        <a href="/dashboard" class="text-blue-600 hover:underline">Dashboard</a>
                        <button onclick="logout()" class="text-red-600 hover:underline">Logout</button>
                    `;
            document.getElementById("cta").innerHTML =
              `<a href="/dashboard" class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition">Go to Dashboard</a>`;
          })
          .catch(() => {
            localStorage.removeItem("token");
            nav.innerHTML = `<a href="/login" class="text-blue-600 hover:underline">Login</a>`;
          });
      } else {
        nav.innerHTML = `<a href="/login" class="text-blue-600 hover:underline">Login</a>`;
      }
    </script>
  </body>
</html>
