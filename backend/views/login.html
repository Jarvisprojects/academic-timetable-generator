<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Timetable Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center mb-8">
          <div
            class="mx-auto w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center"
          >
            <svg
              class="w-8 h-8 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6v6m0 0v6m0-6h6m-6 0H6"
              />
            </svg>
          </div>
          <h2 class="text-3xl font-bold text-slate-800 mt-4">Welcome back</h2>
          <p class="text-slate-500">Sign in to your account</p>
        </div>
        <div
          id="error"
          class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded mb-4 hidden"
        ></div>
        <form id="login-form">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              name="username"
              required
              class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              name="password"
              required
              class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
      if (localStorage.getItem("token")) {
        fetch("/api/auth/me", {
          headers: { Authorization: `Bearer ${localStorage.getItem("token")}` },
        })
          .then((res) => res.ok && window.location.replace("/dashboard"))
          .catch(() => {});
      }
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const form = e.target;
          const username = form.username.value;
          const password = form.password.value;
          try {
            await login(username, password);
            window.location.href = "/dashboard";
          } catch (err) {
            const errDiv = document.getElementById("error");
            errDiv.textContent = err.message;
            errDiv.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
